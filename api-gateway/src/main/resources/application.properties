spring.application.name=api-gateway
server.port=8080

# ===== GATEWAY ROUTES =====
# Route to Users and Organizations Microservice (Port 8084)
spring.cloud.gateway.routes[0].id=usuarios
spring.cloud.gateway.routes[0].uri=http://localhost:8084
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/**,/api/organizations/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}

# Route to Reports Microservice (Port 8083)
spring.cloud.gateway.routes[1].id=reportes
spring.cloud.gateway.routes[1].uri=http://localhost:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/reports/**,/api/mascotas/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}

# Route to Geolocation Microservice (Port 8081)
spring.cloud.gateway.routes[2].id=geolocalizacion
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/map/**,/api/ubicaciones/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}

# Route to Matching Microservice (Port 8082)
spring.cloud.gateway.routes[3].id=coincidencias
spring.cloud.gateway.routes[3].uri=http://localhost:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/matches/**,/api/coincidencias/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}

# Route to Notifications Microservice (Port 8085)
spring.cloud.gateway.routes[4].id=notificaciones
spring.cloud.gateway.routes[4].uri=http://localhost:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/(?<segment>.*), /$\{segment}

# ===== CORS CONFIGURATION =====
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=false

# ===== SECURITY =====
jwt.secret=your-secret-key-change-in-production
jwt.expiration=86400000
