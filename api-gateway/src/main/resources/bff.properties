# ===== BFF (Backend for Frontend) Configuration =====

# Enable caching for BFF responses
spring.cache.type=simple

# BFF endpoint prefix
bff.api.prefix=/api/bff

# ===== Response Caching =====
# Cache TTL in seconds
bff.cache.dashboard.ttl=300
bff.cache.reporte.ttl=600
bff.cache.coincidencias.ttl=300
bff.cache.notificaciones.ttl=60

# ===== Microservices Configuration =====
# Internal communication URLs (Adjust based on deployment)
ms.usuarios.url=http://localhost:8084
ms.reportes.url=http://localhost:8083
ms.geolocalizacion.url=http://localhost:8081
ms.coincidencias.url=http://localhost:8082
ms.notificaciones.url=http://localhost:8085

# ===== BFF Timeouts =====
bff.client.connection-timeout=5000
bff.client.read-timeout=10000

# ===== Aggregation Settings =====
# Maximum results per aggregation
bff.aggregation.max-results=50
bff.aggregation.dashboard.max-reports=10
bff.aggregation.dashboard.max-notifications=10
bff.aggregation.dashboard.max-matches=5

# Enable parallel data fetching (for future async implementation)
bff.aggregation.parallel-enabled=true
bff.aggregation.parallel-threads=10
