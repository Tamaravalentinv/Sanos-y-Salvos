spring.application.name=api-gateway
server.port=8080

spring.cloud.gateway.routes[0].id=mascotas
spring.cloud.gateway.routes[0].uri=http://localhost:8083
spring.cloud.gateway.routes[0].predicates[0]=Path=/mascotas/**

spring.cloud.gateway.routes[1].id=geolocalizacion
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/ubicaciones/**

spring.cloud.gateway.routes[2].id=coincidencias
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/coincidencias/**
