name: CI/CD Pipeline - Sanos y Salvos

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  security-events: write
  checks: write

jobs:
  # Job 1: Tests
  test:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: sanosuser
          MYSQL_PASSWORD: sanospass123
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Install MySQL client
      run: sudo apt-get update && sudo apt-get install -y mysql-client
    
    - name: Wait for MySQL
      run: |
        for i in {1..60}; do
          if mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" 2>/dev/null; then
            echo "MySQL is ready"
            break
          fi
          echo "Waiting for MySQL... ($i/60)"
          sleep 1
        done
    
    - name: Create databases
      run: |
        apt-get update && apt-get install -y mysql-client
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_usuarios;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_reportes;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_geolocalizacion;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_coincidencias;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_notificaciones;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_proyectos;"
        mysql -h 127.0.0.1 -u root -proot -e "CREATE DATABASE IF NOT EXISTS sanos_recursos_humanos;"
    
    - name: Run Tests and Generate Coverage
      run: mvn clean test jacoco:report -DskipITs=true
      env:
        SPRING_PROFILES_ACTIVE: test
        SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/sanos_usuarios?allowPublicKeyRetrieval=true&useSSL=false
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        MAVEN_OPTS: -Xmx1024m
    
    - name: Upload test results
      if: always()
      run: |
        ls -la target/site/jacoco/ 2>/dev/null || echo "No coverage report found"
        ls -la target/surefire-reports/ 2>/dev/null || echo "No surefire reports"
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        fail_ci_if_error: false

  # Job 2: Build
  build:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build all modules
      run: mvn clean package -DskipTests=true
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifacts
        path: '**/target/*.jar'
        retention-days: 5

  # Job 3: Docker Build (opcional)
  docker-build:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: jar-artifacts
    
    - name: Build and push API Gateway
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./api-gateway/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sanos-api-gateway:latest

    - name: Build and push MS Coincidencias
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ms-coincidencias/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sanos-coincidencias:latest

    - name: Build and push MS Geolocalizacion
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ms-geolocalizacion/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sanos-geolocalizacion:latest

    - name: Build and push MS Reportes
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./ms-reportes/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sanos-reportes:latest

  # Job 4: Security Analysis
  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'trivy-results.sarif'
      if: always()
      continue-on-error: true
