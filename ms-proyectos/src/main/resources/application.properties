spring.application.name=ms-proyectos
server.port=8086

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/sanosysalvos?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=sanosysalvos_secret_key_proyectos_123456789
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.sanosysalvos=DEBUG
